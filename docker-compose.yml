services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "8010:8000"
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - ./souce:/app/souce:ro
      - ./graphify-out:/app/graphify-out:ro

volumes:
  qdrant_storage:
